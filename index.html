<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>100m 달리기 육성 게임</title>

  <!-- 스타일 연결 -->
  <link rel="stylesheet" href="track.css">
  <link rel="stylesheet" href="player.css">
</head>
<body>
  <!-- 경기장 -->
  <div class="track-container">
    <div class="track">
      <div class="start-line"></div>
      <div class="finish-line"></div>

      <!-- 7개의 레인 -->
      <div class="lane lane-1"><span class="lane-number">1</span><div class="player main"></div></div>
      <div class="lane lane-2"><span class="lane-number">2</span><div class="player opponent"></div></div>
      <div class="lane lane-3"><span class="lane-number">3</span><div class="player opponent"></div></div>
      <div class="lane lane-4"><span class="lane-number">4</span><div class="player opponent"></div></div>
      <div class="lane lane-5"><span class="lane-number">5</span><div class="player opponent"></div></div>
      <div class="lane lane-6"><span class="lane-number">6</span><div class="player opponent"></div></div>
      <div class="lane lane-7"><span class="lane-number">7</span><div class="player opponent"></div></div>
    </div>
  </div>

  <!-- 게임 로직 -->
  <script src="gamemanager.js"></script>
</body>
</html>
