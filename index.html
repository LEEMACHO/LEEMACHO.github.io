<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>100m 달리기 육성 게임</title>

  <!-- 스타일 연결 -->
  <link rel="stylesheet" href="track.css">
  <link rel="stylesheet" href="player.css">
  <link rel="stylesheet" href="ui.css">

  <!-- 반응형 기본 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <!-- UI 영역 -->
  <div id="game-ui">
    <button id="start-button">게임 시작</button>
    <button id="train-button">선수 육성</button>
    <button id="menu-button">메뉴</button>
  </div>

  <!-- 경기장 -->
  <div class="track-container">
    <div class="track">
      <div class="start-line"></div>
      <div class="finish-line"></div>

      <!-- 7개의 레인 -->
      <div class="lane" style="top: calc(0 * (100% / 7));"><span class="lane-number">1</span></div>
      <div class="lane" style="top: calc(1 * (100% / 7));"><span class="lane-number">2</span></div>
      <div class="lane" style="top: calc(2 * (100% / 7));"><span class="lane-number">3</span></div>
      <div class="lane" style="top: calc(3 * (100% / 7));"><span class="lane-number">4</span></div>
      <div class="lane" style="top: calc(4 * (100% / 7));"><span class="lane-number">5</span></div>
      <div class="lane" style="top: calc(5 * (100% / 7));"><span class="lane-number">6</span></div>
      <div class="lane" style="top: calc(6 * (100% / 7));"><span class="lane-number">7</span></div>
    </div>
  </div>

  <!-- 게임 로직 -->
  <script src="gamemanager.js"></script>
</body>
</html>
